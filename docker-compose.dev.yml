version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: stellarpod-postgres
    environment:
      POSTGRES_USER: stellarpod
      POSTGRES_PASSWORD: stellarpod123
      POSTGRES_DB: stellarpod
    ports:
      - "5432:5432"
    volumes:
      - stellarpod-pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: stellarpod-redis
    ports:
      - "6379:6379"

volumes:
  stellarpod-pgdata:
